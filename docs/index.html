<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Erasmus+ — KA15x Project Finder</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app" class="app-root">
      <header class="top-header">
        <div class="header-inner">
          <div class="titles">
            <div class="title">Erasmus+</div>
            <div class="subtitle">KA15x Project Finder</div>
          </div>
          <img src="./assets/eu.svg" alt="EU" class="eu-badge" />
        </div>
        <div class="search-row">
          <input id="searchInput" placeholder="Search projects, NGOs, cities…" aria-label="Search projects" />
          <button id="filtersToggle" class="icon-btn" aria-label="Filters"><span class="filter-badge" id="filtersCount">0</span>⚙️</button>
        </div>
        <div id="chipsRow" class="chips-row" aria-hidden="false"></div>
      </header>

      <main id="view" class="view"></main>

      <nav class="bottom-nav">
        <button data-route="#/explore" class="nav-item" id="navExplore">🏠<span>Explore</span></button>
        <button data-route="#/add" class="nav-item primary" id="navAdd">➕<span>Add</span></button>
        <button data-route="#/saved" class="nav-item" id="navSaved">🔖<span>Saved</span></button>
      </nav>
    </div>

    <div id="modalRoot"></div>

    <script src="./app.js"></script>
  </body>
</html>
